# Training Configuration
environment:
  lidar_bins: 20
  max_episode_steps: 1000
  time_delta: 0.1
  arena_size: 9.0

robot:
  max_linear_vel: 1.0
  max_angular_vel: 1.0

rewards:
  goal_reached: 100.0
  collision: -100.0
  progress_scale: 10.0

thresholds:
  goal_reached: 0.5
  collision: 0.33

td3:
  learning_rate: 0.0003
  buffer_size: 100000
  batch_size: 256
  tau: 0.005
  gamma: 0.99
  net_arch: [400, 300]

training:
  total_timesteps: 500000
  checkpoint_freq: 10000
  eval_freq: 5000